name: Sonar
options:
  bundleIdPrefix: app.sonar
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: de
  xcodeVersion: "16.4"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG SONAR_VERBOSE_LOGGING
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  Sonar:
    type: application
    platform: iOS
    sources:
      - path: sonar
        excludes:
          - "**/.DS_Store"
          - "Resources/Info.plist"
          - "Resources/Sonar.entitlements"
    resources:
      - path: sonar/Resources/Assets.xcassets
        optional: true
    # Info.plist is hand-maintained at sonar/Resources/Info.plist —
    # XcodeGen would otherwise overwrite it on every `xcodegen generate`.
    # Same for entitlements — file is hand-maintained.
    # path: sonar/Resources/Sonar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sonar.ios
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: sonar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: sonar/Resources/Sonar.entitlements
    # SPM deps are intentionally empty. LiveKit will be added back in
    # §10/7 when FarTransport actually consumes it. Adding heavy
    # binary deps (WebRTC.xcframework via LiveKit) to a skeleton
    # build risks linking issues that have nothing to do with our code.

  SonarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - sonarTests
    dependencies:
      - target: Sonar
