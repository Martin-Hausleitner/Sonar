name: Sonar
options:
  bundleIdPrefix: app.sonar
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: de
  xcodeVersion: "16.4"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG SONAR_VERBOSE_LOGGING
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  Sonar:
    type: application
    platform: iOS
    sources:
      - path: sonar
        excludes:
          - "**/.DS_Store"
    resources:
      - path: sonar/Resources/Assets.xcassets
        optional: true
    info:
      path: sonar/Resources/Info.plist
      properties:
        CFBundleDisplayName: Sonar
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
          - bluetooth-le
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: >
          Sonar braucht dein Mikro, damit du mit deinen Freunden reden kannst.
        NSBluetoothAlwaysUsageDescription: >
          Sonar nutzt Bluetooth, um deine AirPods und die iPhones deiner
          Freunde zu finden.
        NSLocalNetworkUsageDescription: >
          Sonar redet direkt mit anderen iPhones in deinem WLAN oder in
          Bluetooth-Reichweite, ohne Umweg über das Internet.
        NSNearbyInteractionUsageDescription: >
          Sonar nutzt Ultra-Wideband, um die Entfernung zu deinem
          Gesprächspartner zentimetergenau zu messen.
        NSAppleMusicUsageDescription: >
          Sonar mischt Musik aus deiner Apple-Music-Bibliothek im
          Club-Modus dezent in den Hintergrund.
        NSBonjourServices:
          - _sonar._tcp
          - _sonar._udp
        UIBackgroundModes:
          - audio
          - voip
          - processing
        NSSupportsLiveActivities: true
    entitlements:
      path: sonar/Resources/Sonar.entitlements
      properties:
        com.apple.developer.networking.multipath: true
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sonar.ios
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: sonar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: sonar/Resources/Sonar.entitlements
    dependencies:
      - package: LiveKit
        product: LiveKitClient
      - package: SwiftLog
        product: Logging
      - package: AsyncAlgorithms
        product: AsyncAlgorithms

  SonarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - sonarTests
    dependencies:
      - target: Sonar

packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: "2.13.0"
  SwiftLog:
    url: https://github.com/apple/swift-log
    from: "1.5.4"
  AsyncAlgorithms:
    url: https://github.com/apple/swift-async-algorithms
    from: "1.0.0"
