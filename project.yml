name: Sonar
options:
  bundleIdPrefix: app.sonar
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: de
  xcodeVersion: "26.4"

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG SONAR_VERBOSE_LOGGING
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

schemes:
  Sonar:
    build:
      targets:
        Sonar: all
        SonarTests: [test]
    test:
      config: Debug
      targets:
        - SonarTests
        - SonarUITests
      commandLineArguments: {}
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: "2.0.0"
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: "0.18.0"

targets:
  Sonar:
    type: application
    platform: iOS
    sources:
      - path: sonar
        excludes:
          - "**/.DS_Store"
          - "Resources/Info.plist"
          - "Resources/Sonar.entitlements"
          - "Resources/Assets.xcassets"
    # Info.plist is hand-maintained at sonar/Resources/Info.plist —
    # XcodeGen would otherwise overwrite it on every `xcodegen generate`.
    # Same for entitlements — file is hand-maintained.
    # path: sonar/Resources/Sonar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.sonar.ios
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: sonar/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: sonar/Resources/Sonar.entitlements
        # Disable asset-catalog per-device thinning so the build works with
        # any installed simulator runtime (not just the exact SDK version).
        ASSETCATALOG_FILTER_FOR_THINNING_DEVICE_CONFIGURATION: ""
        ENABLE_ONLY_ACTIVE_RESOURCES: "NO"
    dependencies:
      - package: LiveKit
        product: LiveKit
      - package: ArgmaxOSS
        product: WhisperKit

  SonarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - sonarTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Für Live-Transkription während der Session."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Für Sprachaufnahme während der Session."
    dependencies:
      - target: Sonar

  SonarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - sonarUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: Sonar
