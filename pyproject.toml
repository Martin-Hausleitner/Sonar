[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
    ".claude",
    ".git",
    "build",
    "releases",
]

[tool.ruff.lint]
select = [
    "B",
    "E",
    "F",
    "I",
    "PERF",
    "PLC",
    "PLE",
    "PLW",
    "RUF",
    "SIM",
    "UP",
]
ignore = [
    "PLW0603",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
