name: CI
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version
          sw_vers

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          else
            echo "xcodegen already installed: $(xcodegen --version)"
          fi

      - name: Install quality tools
        run: |
          set -euo pipefail
          for tool in swiftformat swiftlint shellcheck yamllint actionlint ruff; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              brew install "$tool"
            else
              echo "$tool already installed: $($tool --version | head -1)"
            fi
          done

      - name: Lint
        run: make lint

      - name: Generate Xcode project
        id: xcodegen
        continue-on-error: true
        run: |
          set -o pipefail
          xcodegen generate 2>&1 | tee xcodegen.log

      - name: Check generated project is committed
        id: xcodegen-diff
        if: steps.xcodegen.outcome == 'success'
        continue-on-error: true
        run: |
          git ls-files --error-unmatch \
            Sonar.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          git diff --exit-code -- \
            project.yml \
            Sonar.xcodeproj/project.pbxproj \
            Sonar.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Pick first available iPhone simulator
        id: pick-sim
        if: steps.xcodegen.outcome == 'success'
        run: |
          set -e
          xcrun simctl list devices available --json > sims.json
          DEVICE_ID=$(python3 - <<'PY'
          import json, sys
          with open('sims.json') as f:
              data = json.load(f)
          for runtime, devs in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit('no iPhone simulator available')
          PY
          )
          echo "device-id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Picked simulator: $DEVICE_ID"

      - name: Resolve Swift packages
        id: package-resolve
        if: steps.xcodegen.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 10
        run: |
          set -o pipefail
          xcodebuild -resolvePackageDependencies \
            -project Sonar.xcodeproj \
            -scheme Sonar \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -scmProvider system \
            -packageAuthorizationProvider netrc \
            -disableAutomaticPackageResolution 2>&1 | tee package-resolve.log

      - name: Build (Debug, iOS Simulator)
        id: build
        if: steps.xcodegen.outcome == 'success' && steps.package-resolve.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild build \
            -project Sonar.xcodeproj \
            -scheme Sonar \
            -configuration Debug \
            -destination "id=${{ steps.pick-sim.outputs.device-id }}" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -scmProvider system \
            -packageAuthorizationProvider netrc \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES 2>&1 | tee build.log

      - name: Test (Debug, iOS Simulator)
        id: test
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild test \
            -project Sonar.xcodeproj \
            -scheme Sonar \
            -configuration Debug \
            -destination "id=${{ steps.pick-sim.outputs.device-id }}" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -scmProvider system \
            -packageAuthorizationProvider netrc \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -resultBundlePath TestResults.xcresult 2>&1 | tee test.log

      - name: Extract diagnostics
        if: always()
        run: |
          {
            echo "## XcodeGen outcome: ${{ steps.xcodegen.outcome }}"
            echo "## XcodeGen committed-diff outcome: ${{ steps.xcodegen-diff.outcome }}"
            echo "## Package resolve outcome: ${{ steps.package-resolve.outcome }}"
            echo "## Build outcome: ${{ steps.build.outcome }}"
            echo "## Test outcome: ${{ steps.test.outcome }}"
            echo
            echo "## XcodeGen log (tail 80)"
            tail -80 xcodegen.log 2>/dev/null || echo "(no xcodegen.log)"
            echo
            echo "## Package resolve log (tail 80)"
            tail -80 package-resolve.log 2>/dev/null || echo "(no package-resolve.log)"
            echo
            echo "## Errors and warnings from build (last 60)"
            BUILD_PATTERN="(error:|warning:|note:|Undefined symbol|Failed |Linker command failed)"
            grep -E "$BUILD_PATTERN" build.log 2>/dev/null | tail -60 || echo "(no build.log or no matches)"
            echo
            echo "## Errors and warnings from test (last 60)"
            TEST_PATTERN="(error:|warning:|FAIL|XCTAssert|Test Suite|Test Case)"
            grep -E "$TEST_PATTERN" test.log 2>/dev/null | tail -60 || echo "(no test.log or no matches)"
            echo
            echo "## Build log tail (last 80 lines)"
            tail -80 build.log 2>/dev/null || echo "(no build.log)"
            echo
            echo "## Test log tail (last 80 lines)"
            tail -80 test.log 2>/dev/null || echo "(no test.log)"
          } > diagnostics.txt
          cat diagnostics.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.sha }}
          path: |
            xcodegen.log
            package-resolve.log
            build.log
            test.log
            diagnostics.txt
            sims.json
            TestResults.xcresult
          if-no-files-found: ignore

      - name: Post issue if failed
        if: >-
          failure() ||
          steps.build.outcome == 'failure' ||
          steps.xcodegen.outcome == 'failure' ||
          steps.xcodegen-diff.outcome == 'failure' ||
          steps.package-resolve.outcome == 'failure' ||
          steps.test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diagnostics = fs.existsSync('diagnostics.txt')
              ? fs.readFileSync('diagnostics.txt', 'utf8')
              : '(no diagnostics file)';
            const body = [
              `Automated CI failure report.`,
              ``,
              `- run: ${context.runId}`,
              `- url: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- sha: ${context.sha}`,
              ``,
              '```',
              diagnostics.slice(0, 50000),
              '```'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure on ${context.sha.slice(0,7)}`,
              body: body,
              labels: ['ci-failure']
            });

      - name: Fail the job if any step failed
        if: >-
          steps.build.outcome == 'failure' ||
          steps.xcodegen.outcome == 'failure' ||
          steps.xcodegen-diff.outcome == 'failure' ||
          steps.package-resolve.outcome == 'failure' ||
          steps.test.outcome == 'failure'
        run: exit 1
