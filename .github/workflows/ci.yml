name: CI
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version
          sw_vers

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          else
            echo "xcodegen already installed: $(xcodegen --version)"
          fi

      - name: Generate Xcode project
        id: xcodegen
        continue-on-error: true
        run: |
          set -o pipefail
          xcodegen generate 2>&1 | tee xcodegen.log

      - name: Pick first available iPhone simulator
        id: pick-sim
        if: steps.xcodegen.outcome == 'success'
        run: |
          set -e
          xcrun simctl list devices available --json > sims.json
          DEVICE_ID=$(python3 - <<'PY'
          import json, sys
          with open('sims.json') as f:
              data = json.load(f)
          for runtime, devs in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit('no iPhone simulator available')
          PY
          )
          echo "device-id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Picked simulator: $DEVICE_ID"

      - name: Build (Debug, iOS Simulator)
        id: build
        if: steps.xcodegen.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild build \
            -project Sonar.xcodeproj \
            -scheme Sonar \
            -configuration Debug \
            -destination "id=${{ steps.pick-sim.outputs.device-id }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES 2>&1 | tee build.log

      - name: Extract diagnostics
        if: always()
        run: |
          {
            echo "## Build outcome: ${{ steps.build.outcome }}"
            echo "## XcodeGen outcome: ${{ steps.xcodegen.outcome }}"
            echo
            echo "## XcodeGen log (tail 80)"
            tail -80 xcodegen.log 2>/dev/null || echo "(no xcodegen.log)"
            echo
            echo "## Errors and warnings from build (last 60)"
            grep -E "(error:|warning:|note:|Undefined symbol|Failed |Linker command failed)" build.log 2>/dev/null | tail -60 || echo "(no build.log or no matches)"
            echo
            echo "## Build log tail (last 120 lines)"
            tail -120 build.log 2>/dev/null || echo "(no build.log)"
          } > diagnostics.txt
          cat diagnostics.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-${{ github.sha }}
          path: |
            xcodegen.log
            build.log
            diagnostics.txt
            sims.json
          if-no-files-found: ignore

      - name: Post issue if failed
        if: failure() || steps.build.outcome == 'failure' || steps.xcodegen.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diagnostics = fs.existsSync('diagnostics.txt')
              ? fs.readFileSync('diagnostics.txt', 'utf8')
              : '(no diagnostics file)';
            const body = [
              `Automated CI failure report.`,
              ``,
              `- run: ${context.runId}`,
              `- url: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- sha: ${context.sha}`,
              ``,
              '```',
              diagnostics.slice(0, 50000),
              '```'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure on ${context.sha.slice(0,7)}`,
              body: body,
              labels: ['ci-failure']
            });

      - name: Fail the job if build failed
        if: steps.build.outcome == 'failure' || steps.xcodegen.outcome == 'failure'
        run: exit 1
